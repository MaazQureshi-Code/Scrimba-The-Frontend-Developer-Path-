<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div class="container">
            <div class="scoreboard">
                <h3>HOME</h3>
                <div class="num">
                    <p id="num1">1</p>
                </div>
                <div class="btn1">
                    <button class="btn" onclick="homeAdd1()">+1</button>
                    <button class="btn" onclick="homeAdd2()">+2</button>
                    <button class="btn" onclick="homeAdd3()">+3</button>
                    <button class="btn" onclick="homeReset()">Reset</button>
                </div>
            </div>
            <div class="scoreboard">
                <h3>GUEST</h3>
                <div class="num">
                    <p id="num2">2</p>
                </div>
                <div class="btn1">
                    <button class="btn"onclick="guestAdd1()" id="guestAdd1">+1</button>
                    <button class="btn" onclick="guestAdd2()" id="guestAdd2">+2</button>
                    <button class="btn" onclick="guestAdd3()" id="guestAdd3">+3</button>
                    <button class="btn" onclick="guestReset()" id="guestReset">Reset</button>
                </div>
            </div>
        </div>

<script src="./index.js"></script>
</body>
</html>
